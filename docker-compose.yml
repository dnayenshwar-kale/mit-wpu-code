version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - AZURE_DB_URL=jdbc:mysql://mysql:3306/demo_db
      - AZURE_DB_USERNAME=demo_user
      - AZURE_DB_PASSWORD=demo_password
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - demo-network

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=demo_db
      - MYSQL_USER=demo_user
      - MYSQL_PASSWORD=demo_password
      - MYSQL_ROOT_PASSWORD=root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - demo-network

  # Optional: Application Insights simulator
  # appinsights:
  #   image: mcr.microsoft.com/applicationinsights/localforwarder:latest
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - APPINSIGHTS_INSTRUMENTATIONKEY=your-key
  #   networks:
  #     - demo-network

volumes:
  mysql_data:

networks:
  demo-network:
    driver: bridge