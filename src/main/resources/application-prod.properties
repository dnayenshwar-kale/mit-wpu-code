# Production Configuration for Azure Deployments

# Database Configuration (Azure Database for MySQL/PostgreSQL)
# For Azure MySQL: jdbc:mysql://<server-name>.mysql.database.azure.com:3306/<database-name>
# For Azure PostgreSQL: jdbc:postgresql://<server-name>.postgres.database.azure.com:5432/<database-name>
# spring.datasource.url=${AZURE_DB_URL}
# spring.datasource.username=${AZURE_DB_USERNAME}
# spring.datasource.password=${AZURE_DB_PASSWORD}
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# For Azure SQL Database
# spring.datasource.url=jdbc:sqlserver://<server-name>.database.windows.net:1433;database=<database-name>;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;
# spring.datasource.username=${AZURE_SQL_USERNAME}
# spring.datasource.password=${AZURE_SQL_PASSWORD}
# spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
# spring.jpa.database-platform=com.microsoft.sqlserver.hibernate.SQLServerDialect

# JPA Configuration for Production
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (disabled in production)
spring.h2.console.enabled=false

# Actuator endpoints (restricted in production)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Server Configuration
server.port=${PORT:8080}

# Logging Configuration for Production
logging.level.com.example.demo=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.com.microsoft.azure=WARN

# Azure Application Insights
azure.application-insights.instrumentation-key=${APPINSIGHTS_INSTRUMENTATIONKEY}

# Azure Key Vault
azure.keyvault.enabled=true
azure.keyvault.uri=${AZURE_KEYVAULT_URI}
azure.keyvault.client-id=${AZURE_CLIENT_ID}
azure.keyvault.client-key=${AZURE_CLIENT_SECRET}
azure.keyvault.tenant-id=${AZURE_TENANT_ID}

# CORS Configuration for Production
# app.cors.allowed-origins=${ALLOWED_ORIGINS:https://yourdomain.com}