# Database Configuration (H2 for development, can be overridden for production)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Springdoc (Swagger) settings
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=

# Actuator endpoints for health checks and monitoring
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.health.diskspace.enabled=true
management.health.db.enabled=true

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Logging Configuration
logging.level.com.example.demo=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Azure Application Insights (configure via environment variables in production)
# azure.application-insights.instrumentation-key=${APPINSIGHTS_INSTRUMENTATIONKEY}

# Azure Key Vault (configure via environment variables)
# azure.keyvault.enabled=true
# azure.keyvault.uri=${AZURE_KEYVAULT_URI}
# azure.keyvault.client-id=${AZURE_CLIENT_ID}
# azure.keyvault.client-key=${AZURE_CLIENT_SECRET}
# azure.keyvault.tenant-id=${AZURE_TENANT_ID}

# CORS Configuration
app.cors.allowed-origins=*
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true
