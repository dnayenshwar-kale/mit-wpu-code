# Azure-Specific Configuration

# Azure Database Configuration
spring.datasource.url=${AZURE_DB_URL}
spring.datasource.username=${AZURE_DB_USERNAME}
spring.datasource.password=${AZURE_DB_PASSWORD}

# Use MySQL for Azure Database for MySQL
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Azure-specific JPA settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Azure Application Insights
azure.application-insights.instrumentation-key=${APPINSIGHTS_INSTRUMENTATIONKEY}

# Azure Key Vault
azure.keyvault.enabled=true
azure.keyvault.uri=${AZURE_KEYVAULT_URI}
azure.keyvault.client-id=${AZURE_CLIENT_ID}
azure.keyvault.client-key=${AZURE_CLIENT_SECRET}
azure.keyvault.tenant-id=${AZURE_TENANT_ID}

# Azure-specific logging
logging.level.com.microsoft.azure=INFO

# Health checks for Azure Load Balancer
management.health.azure.enabled=true

# Server configuration for Azure
server.port=${PORT:8080}
server.servlet.context-path=/

# Azure-specific CORS (if needed)
# app.cors.allowed-origins=${ALLOWED_ORIGINS}