# Azure-Specific Configuration

# Azure Database Configuration
spring.datasource.url=${AZURE_DB_URL}
spring.datasource.username=${AZURE_DB_USERNAME}
spring.datasource.password=${AZURE_DB_PASSWORD}

# Use MySQL for Azure Database for MySQL
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Azure-specific JPA settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Azure Application Insights
# Instrumentation key is automatically detected if using agent attachment
# Or set it explicitly:
# applicationinsights.connection.string=InstrumentationKey=${APPINSIGHTS_INSTRUMENTATIONKEY}

# Azure Key Vault configuration
# Use environment variable AZURE_KEYVAULT_ENDPOINT to point to your Key Vault
# Example: https://your-keyvault.vault.azure.net/

# Azure authentication
# For Managed Identity (recommended on Azure resources) - automatically detected
# For Service Principal - set these environment variables:
#   AZURE_TENANT_ID
#   AZURE_CLIENT_ID
#   AZURE_CLIENT_SECRET

# Azure-specific logging
logging.level.com.microsoft.azure=INFO
logging.level.com.azure=INFO

# Health checks for Azure Load Balancer
management.health.azure.enabled=true

# Server configuration for Azure
server.port=${PORT:8080}
server.servlet.context-path=/

# Azure-specific CORS (if needed)
# app.cors.allowed-origins=${ALLOWED_ORIGINS}